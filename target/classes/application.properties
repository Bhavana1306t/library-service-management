# ============================================================
#  Library Management System - Application Properties
# ============================================================

# ---------- JSP View Resolver ----------
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ---------- H2 In-Memory Database ----------
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------- JPA / Hibernate ----------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create-drop' recreates schema on each startup (good for dev/demo)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- H2 Web Console (visit http://localhost:8080/h2-console) ----------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- Server ----------
server.port=8080
